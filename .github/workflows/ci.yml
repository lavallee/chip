name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync (dev group)
        run: uv sync --frozen
      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/ --output-format=github
      - name: Run tests
        run: uv run pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Export locked third-party requirements
        run: >
          uv export --no-dev --format requirements.txt --frozen
          --output-file requirements-audit.txt
      - name: Audit Python dependencies (pip-audit)
        run: >
          uvx --from pip-audit pip-audit -r requirements-audit.txt
          --strict --no-deps --disable-pip
      - name: Audit GitHub Actions (zizmor)
        run: >
          uvx --from zizmor zizmor .github/workflows
          --offline --min-severity high --min-confidence high --format github
